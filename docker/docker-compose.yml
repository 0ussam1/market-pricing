version: '3.8'

services:
  db:
    image: postgres:16
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=market_research
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://user:pass@db:5432/market_research
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - app_network

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uv run celery -A config worker -l info
    volumes:
      - ../backend:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://user:pass@db:5432/market_research
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - app_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host
    ports:
      - "3000:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - app_network
    depends_on:
      - backend

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
